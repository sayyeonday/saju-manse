<title>사주 만세력</title>
<style>
  :root{
    --mok:#3f8f5b; --hwa:#cf3b34; --to:#bd9648; --geum:#fbfbf9; --su:#222428;
    --bg:#eceae3; --paper:#fbfaf6; --line:#e3ddd0; --line2:#efe9dc;
    --ink:#26241f; --muted:#8c887d; --accent:#b08d4f;
  }
  *{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:var(--bg); color:var(--ink); margin:0; padding:32px 18px 56px; line-height:1.6; font-size:17px;
    -webkit-font-smoothing:antialiased;}
  .wrap{max-width:780px; margin:0 auto;}

  /* 헤더 */
  .head{text-align:center; margin:0 0 26px;}
  .head h1{font-size:30px; font-weight:700; letter-spacing:.06em; margin:0;}
  .head .han{font-family:"AppleMyungjo","Nanum Myeongjo",serif; color:var(--accent); font-size:16px; letter-spacing:.45em; margin-top:7px; padding-left:.45em;}

  h2{font-size:17px; font-weight:700; letter-spacing:.02em; margin:0 0 14px; color:var(--ink);
    display:flex; align-items:center; gap:8px;}
  h2::before{content:""; width:5px; height:5px; border-radius:50%; background:var(--accent); display:inline-block;}

  .card{background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:20px;
    margin:0 0 14px; overflow-x:auto; box-shadow:0 1px 2px rgba(40,36,28,.04);}

  /* 입력 폼 */
  .form{display:flex; flex-wrap:wrap; gap:10px 12px; align-items:flex-end;}
  .form>div{display:flex; flex-direction:column;}
  .form label{font-size:13px; color:var(--muted); margin-bottom:5px; letter-spacing:.04em;}
  .form input,.form select{height:46px; padding:0 12px; border:1px solid var(--line); border-radius:10px;
    font-size:16px; width:92px; background:#fff; color:var(--ink); transition:border-color .15s, box-shadow .15s;}
  .form select{padding-right:6px;}
  .form input:focus,.form select:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(176,141,79,.18);}
  .form .wide{width:92px;}
  button{height:46px; padding:0 22px; border:1px solid transparent; border-radius:10px; background:var(--ink);
    color:#fff; font-size:16px; font-weight:600; cursor:pointer; transition:opacity .15s, background .15s;}
  button:hover{opacity:.88;}
  button.ghost{background:transparent; color:var(--ink); border-color:var(--line);}
  button.ghost:hover{background:#f1ede3; opacity:1;}
  .hint{font-size:13.5px; color:var(--muted); margin-top:12px; line-height:1.65;}

  /* 사주 4기둥 표 */
  table.saju{border-collapse:separate; border-spacing:0; width:100%; table-layout:fixed;
    border:1px solid var(--line); border-radius:12px; overflow:hidden;}
  table.saju th,table.saju td{border-right:1px solid var(--line2); border-bottom:1px solid var(--line2); text-align:center; padding:7px 3px;}
  table.saju th:last-child,table.saju td:last-child{border-right:none;}
  table.saju tr:last-child td{border-bottom:none;}
  table.saju th{background:#f4efe4; font-size:15px; color:#6f6a5e; font-weight:600; letter-spacing:.04em; padding:11px 3px;}
  .ten{font-size:17px; color:#4f4b42; padding:7px 0; font-weight:600;}
  .gj{height:82px; vertical-align:middle;}
  .glyph{font-family:"AppleMyungjo","Nanum Myeongjo",serif; font-size:40px; font-weight:600; line-height:1.05;}
  .glyph .ko{font-family:-apple-system,"Apple SD Gothic Neo",sans-serif; font-size:14px; font-weight:500; display:block; opacity:.92; margin-top:3px;}
  .sub{font-size:14px; color:#6b675c; padding:6px 1px; line-height:1.5;}
  .ss12{font-size:16px; color:#56524a; font-weight:600; line-height:1.45;}
  .jjg{font-size:13px; color:#56524a; padding:7px 3px; line-height:1.6;}
  .chip{display:inline-block; padding:1px 6px; border-radius:5px; margin:1px; font-size:13px; line-height:1.6;}

  table.grid{border-collapse:separate; border-spacing:0; width:100%; font-size:15px;
    border:1px solid var(--line); border-radius:12px; overflow:hidden;}
  table.grid th,table.grid td{border-right:1px solid var(--line2); border-bottom:1px solid var(--line2); padding:7px 8px; text-align:center;}
  table.grid th:last-child,table.grid td:last-child{border-right:none;}
  table.grid tr:last-child td{border-bottom:none;}
  table.grid th{background:#f4efe4; color:#6f6a5e; font-weight:600;}
  table.grid small{font-weight:500; opacity:.92; font-size:13px;}

  .rel{font-size:18px; line-height:2.05;}
  .rel b{font-weight:700;}
  .tag{display:inline-block; background:#f0ece2; border:1px solid var(--line); border-radius:999px;
    padding:4px 13px; margin:3px 4px 3px 0; font-size:16px; color:#5b574d;}
  .tag.warn{background:#f8ece8; border-color:#e6cfc6; color:#9d5b4b;}
  .tag.good{background:#ebf1ec; border-color:#cfe0d4; color:#3f6b51;}
  #copyArea{width:100%; height:170px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12px;
    margin-top:10px; display:none; border:1px solid var(--line); border-radius:9px; padding:10px; background:#fff;}
  .dist span{display:inline-block; padding:3px 10px; border-radius:999px; margin:2px; font-size:13px;}

  /* 이미지 캡처 전용: 좁은 폭에서도 표가 잘리지 않게 접어 글자를 크게 */
  .cap table.grid{table-layout:fixed;}
  .cap table.grid th,.cap table.grid td{padding:7px 2px; word-break:keep-all; overflow:hidden;}
  .cap .card{box-shadow:none;}
  .capbox{padding:18px;}
  .capbox .card{margin-bottom:0;}
  .caphead{text-align:center; padding:6px 0 18px;}
  .caphead .capname{font-size:28px; font-weight:700; color:var(--ink); letter-spacing:.02em;}
  .caphead .capmeta{font-size:17px; color:#6b675c; margin-top:6px;}
</style>

    <div><label>지역</label><select id="region" style="width:160px"></select></div>
    <div><label>진태양시</label><select id="tsolar"><option value="1" selected>적용</option><option value="0">미적용</option></select></div>
    <div><label>자시 기준</label><select id="jasi"><option value="std">야자시(23~익일01)</option><option value="early">조자시(23시 이후 익일)</option></select></div>
    <button onclick="run()">뽑기</button>
    <button class="ghost" onclick="saveImage(event)">이미지 저장</button>
  </div>
  <div class="hint">양력 입력 · 입력시각은 그 지역 표준시(시계시각). 국가·지역 경도로 진태양시 보정, 한국은 과거 서머타임·표준자오선 이력 자동 반영.</div>
</div>

<div id="result"></div>

/* ===================== 율리우스일 / 태양황경 ===================== */
function jdnInt(y,m,d){ // 그레고리력 정오 정수 JDN
  const a=Math.floor((14-m)/12), yy=y+4800-a, mm=m+12*a-3;
  return d+Math.floor((153*mm+2)/5)+365*yy+Math.floor(yy/4)-Math.floor(yy/100)+Math.floor(yy/400)-32045;
}
function jdFromKST(y,m,d,h,mi){ // KST -> JD(UT)
  // KST = UT+9. 정오기준 JDN을 받아 시각 보정 후 9시간 빼기
  const base = jdnInt(y,m,d) - 0.5; // 자정 JD
  return base + (h*60+mi)/1440 - 9/24;
}
const rad=Math.PI/180;
function solarLong(jd){ // 겉보기 태양황경 (deg)
  const T=(jd-2451545.0)/36525;
  let L0=280.46646+36000.76983*T+0.0003032*T*T;
  const M=357.52911+35999.05029*T-0.0001537*T*T;
  const C=(1.914602-0.004817*T-0.000014*T*T)*Math.sin(M*rad)
         +(0.019993-0.000101*T)*Math.sin(2*M*rad)
         +0.000289*Math.sin(3*M*rad);
  let lon=L0+C-0.00569-0.00478*Math.sin((125.04-1934.136*T)*rad);
  lon=((lon%360)+360)%360;
  return lon;
}
function findTermJD(targetLon, guessJD){ // 황경=target 인 시각
  let jd=guessJD;
  for(let i=0;i<8;i++){
    let diff=targetLon-solarLong(jd);
    while(diff>180)diff-=360; while(diff<-180)diff+=360;
    jd+=diff*365.2422/360;
  }
  return jd;
}
// 균시차(분): 진태양시 = 평균태양시 + EoT
function equationOfTime(y,m,d){
  const start=Date.UTC(y,0,0), now=Date.UTC(y,m-1,d);
  const N=Math.floor((now-start)/86400000); // 연중 일수
  const B=(360/365)*(N-81)*rad;
  return 9.87*Math.sin(2*B)-7.53*Math.cos(B)-1.5*Math.sin(B);
}
function addDays(y,m,d,n){
  const dt=new Date(Date.UTC(y,m-1,d)); dt.setUTCDate(dt.getUTCDate()+n);
  return [dt.getUTCFullYear(),dt.getUTCMonth()+1,dt.getUTCDate()];
}
// 표준시 기준 현지시각 -> JD(UT)
function jdFromLocal(y,m,d,totalMin,tz){
  const base=jdnInt(y,m,d)-0.5;
  return base + totalMin/1440 - tz/24;
}

// 한국 표준자오선 이력 (생년월일 기준)
function koreaStd(y,m,d){
  const md=y*10000+m*100+d;
  if(md>=19540321 && md<=19610809) return {std:127.5,tz:8.5};
  return {std:135,tz:9}; // 1912~1954, 1961~현재
}
// 한국 과거 서머타임 시행 구간 (해당시 시계시각 -1시간)
const KR_DST=[[1948,6,1,9,13],[1949,4,3,9,11],[1950,4,1,9,10],[1951,5,6,9,9],
 [1955,5,5,9,9],[1956,5,20,9,30],[1957,5,5,9,22],[1958,5,4,9,21],[1959,5,3,9,20],
 [1960,5,1,9,18],[1987,5,10,10,11],[1988,5,8,10,9]];
function koreaDST(y,m,d){
  const md=m*100+d;
  for(const r of KR_DST){ if(r[0]===y && md>=r[1]*100+r[2] && md<=r[3]*100+r[4]) return true; }
  return false;
}
// 주요국 서머타임(일광절약) — 날짜 단위 근사
function monthNthSun(y,mo,n){ // n>0: n번째 일요일, n=-1: 마지막 일요일
  if(n>0){ const f=new Date(Date.UTC(y,mo-1,1)).getUTCDay(); return 1+((7-f)%7)+(n-1)*7; }
  const last=new Date(Date.UTC(y,mo,0)); return last.getUTCDate()-last.getUTCDay();
}
function inMd(m,d,sm,sd,em,ed){ const md=m*100+d; return md>=sm*100+sd && md<em*100+ed; }
function usDST(y,m,d){
  if(y>=2007) return inMd(m,d,3,monthNthSun(y,3,2),11,monthNthSun(y,11,1));
  if(y>=1987) return inMd(m,d,4,monthNthSun(y,4,1),10,monthNthSun(y,10,-1));
  if(y>=1967) return inMd(m,d,4,monthNthSun(y,4,-1),10,monthNthSun(y,10,-1));
  return false;
}
function euDST(y,m,d){ return inMd(m,d,3,monthNthSun(y,3,-1),10,monthNthSun(y,10,-1)); }
function auDST(y,m,d){ const md=m*100+d; return md>=1000+monthNthSun(y,10,1) || md<400+monthNthSun(y,4,1); }
function nzDST(y,m,d){ const md=m*100+d; return md>=900+monthNthSun(y,9,-1) || md<400+monthNthSun(y,4,1); }
function isDST(country,region,y,m,d){
  if(country==='미국'||country==='캐나다'){ if(/피닉스|호놀룰루/.test(region)) return false; return usDST(y,m,d); }
  if(country==='멕시코') return (y<=2021)?usDST(y,m,d):false; // 2022 대부분 폐지
  if(['영국','프랑스','독일','이탈리아','스페인','네덜란드','스위스','스웨덴'].includes(country)) return euDST(y,m,d);
  if(country==='호주'){ if(/브리즈번|퍼스|다윈/.test(region)) return false; return auDST(y,m,d); }
  if(country==='뉴질랜드') return nzDST(y,m,d);
  return false; // 그 외(러시아·일본·중국 등 현재 미시행)
}

function strengthAnalysis(P){
  const dm=P.day.s, dmOH=STEM_OH[dm];
  const ours=o=>(o===dmOH||GEN[o]===dmOH); // 비겁(동일) or 인성(생) → 일간 편
  let sup=0, dr=0;
  const KMAP={year:"년",month:"월",day:"일",hour:"시"};
  // 천간(일간 제외): 위치 가중 년0.5 월1.0 시0.7
  const stemW={year:0.5,month:1.0,hour:0.7};
  [["year",P.year.s],["month",P.month.s],["hour",P.hour.s]].forEach(([k,s])=>{
    ours(STEM_OH[s]) ? sup+=stemW[k] : dr+=stemW[k];
  });
  // 지지: 지장간 일수비율 × 위치가중(월지 2.0·일지 1.2·시 0.8·년 0.7) → 통근 강도 반영
  const brW={year:0.7,month:2.0,day:1.2,hour:0.8};
  const rooted=[];
  [["year",P.year],["month",P.month],["day",P.day],["hour",P.hour]].forEach(([k,p])=>{
    let root=false;
    JJG[p.b].forEach(([gan,days])=>{
      const oh=STEM_OH[gan], w=brW[k]*(days/30);
      ours(oh) ? sup+=w : dr+=w;
      if(oh===dmOH) root=true; // 비겁 뿌리 = 통근
    });
    if(root) rooted.push(KMAP[k]+"지");
  });
  const total=sup+dr, ratio=sup/total;
  const label = ratio>=0.56?"신강": ratio<=0.44?"신약":"중화";
  // 조후(계절 기반)
  const SEASON={2:"봄",3:"봄",4:"봄",5:"여름",6:"여름",7:"여름",8:"가을",9:"가을",10:"가을",11:"겨울",0:"겨울",1:"겨울"}[P.month.b];
  const JOHU={"겨울":"한랭 → 火(병·정) 조후 필요","여름":"염열 → 水(임·계) 조후 필요","봄":"온화 → 火로 보온, 균형","가을":"건조·서늘 → 水·火 균형"}[SEASON];
  return {sup:Math.round(sup*10)/10, dr:Math.round(dr*10)/10, ratio, label, rooted, season:SEASON, johu:JOHU};
}

/* ===================== 사주 8글자 ===================== */
function calcSaju(y,m,d,h,mi,opt){
  opt=opt||{lon:126.978,std:135,tz:9,country:"대한민국",trueSolar:true,jasi:'std'};
  // 표준자오선/시간대: 한국은 출생연도별 이력 적용
  let std=opt.std, tz=opt.tz;
  if(opt.country==="대한민국"){ const k=koreaStd(y,m,d); std=k.std; tz=k.tz; }
  // 서머타임 보정: 해당 구간이면 시계시각 -60분 → 표준시
  let dstMin=0, dstApplied=false;
  const dstHit = opt.country==="대한민국" ? koreaDST(y,m,d) : isDST(opt.country,opt.regionName,y,m,d);
  if(dstHit){ dstMin=-60; dstApplied=true; }
  const stdClock = h*60+mi + dstMin;       // 표준시 기준 분(자정 기준, 음수 가능)

  const birthJD = jdFromLocal(y,m,d,stdClock,tz);  // 절대 시각(년·월주용)
  const lon = solarLong(birthJD);

  // 입춘(황경315) 기준 년 보정
  const ipchunJD = findTermJD(315, jdnInt(y,2,4));
  const solarYear = (birthJD < ipchunJD) ? y-1 : y;
  let yStem=((solarYear-4)%10+10)%10, yBr=((solarYear-4)%12+12)%12;

  // 월지: 황경으로 절(節) 구간 → 인월=315
  const seg = Math.floor((((lon-315)%360+360)%360)/30);
  const mBr = (2+seg)%12;
  const startM=((yStem%5)*2+2)%10;
  const mStem=(startM+(((mBr-2)%12+12)%12))%10;

  // 진태양시 보정(경도-표준자오선 + 균시차) → 시(時) 결정용
  let offsetMin=0;
  if(opt.trueSolar) offsetMin = (opt.lon-std)*4 + equationOfTime(y,m,d);
  let total=stdClock+offsetMin;
  let carry=Math.floor(total/1440);
  let tmin=((total%1440)+1440)%1440;
  let th=Math.floor(tmin/60), tmi=Math.round(tmin-th*60);

  // 일주 날짜: 보정으로 날짜가 넘어가면 반영
  let dd=addDays(y,m,d,carry);
  if(opt.jasi==='early' && th>=23) dd=addDays(dd[0],dd[1],dd[2],1);
  const J=jdnInt(dd[0],dd[1],dd[2]);
  const dStem=((J+9)%10+10)%10, dBr=((J+1)%12+12)%12;

  // 시주: 시지 + 시두법(일간 기준)
  const hBrIdx=Math.floor(((th+1)%24)/2);
  const startH=((dStem%5)*2)%10;
  const hStem=(startH+hBrIdx)%10;

  return {
    birthJD, lon, ipchunJD, solarYear, offsetMin, trueH:th, trueMi:tmi, dayDate:dd,
    std, tz, dstApplied,
    pillars:{
      hour:{s:hStem,b:hBrIdx}, day:{s:dStem,b:dBr},
      month:{s:mStem,b:mBr},   year:{s:yStem,b:yBr}
    }
  };
}

/* ===================== 십성 ===================== */
const GEN=[1,2,3,4,0]; // 오행 i 가 생하는 대상 (목->화->토->금->수->목)
const CTRL=[2,3,4,0,1]; // 오행 i 가 극하는 대상 (목극토 화극금 토극수 금극목 수극화)
function tenGod(dmStem, otherStem){
  const a=STEM_OH[dmStem], b=STEM_OH[otherStem];
  const same=(stemYin(dmStem)===stemYin(otherStem));
  if(a===b) return same?"비견":"겁재";
  if(GEN[a]===b) return same?"식신":"상관";   // 내가 생
  if(CTRL[a]===b) return same?"편재":"정재";  // 내가 극
  if(CTRL[b]===a) return same?"편관":"정관";  // 나를 극
  if(GEN[b]===a) return same?"편인":"정인";   // 나를 생
  return "-";
}
// 지지 십성 = 정기 천간 기준
function brTenGod(dmStem, brIdx){
  const main=JJG[brIdx][JJG[brIdx].length-1][0];
  return tenGod(dmStem, main);
}

const STAGE=["장생","목욕","관대","건록","제왕","쇠","병","사","묘","절","태","양"];
const BIRTH_BR={0:11,1:6,2:2,3:9,4:2,5:9,6:5,7:0,8:8,9:3}; // 천간 장생 지지
function twelveStage(stem, brIdx){
  const start=BIRTH_BR[stem];
  const dir=(stem%2===0)?1:-1; // 양간 순행 음간 역행
  let k=((brIdx-start)*dir%12+12)%12;
  return STAGE[k];
}

const CHEONEUL={0:[1,7],4:[1,7],6:[1,7], 1:[0,8],5:[0,8], 2:[11,9],3:[11,9], 7:[2,6], 8:[3,5],9:[3,5]};

// 양인 (양간)

const BAEKHO=new Set(["갑진","을미","병술","정축","무진","임술","계축"]);
const GWEGANG=new Set(["경진","경술","임진","무술"]);

// 기둥별 신살 반환: [시,일,월,년]
function calcSinsal(P){
  const order=[P.hour,P.day,P.month,P.year];
  const res=[[],[],[],[]];
  const branches=order.map(p=>p.b);
  function addByBr(name, targets){ order.forEach((p,i)=>{ if(targets.has(p.b)) res[i].push(name); }); }
  // 천을귀인: 일간 기준
  const dm=P.day.s;
  if(CHEONEUL[dm]) addByBr("천을귀인", new Set(CHEONEUL[dm]));
  // 문창·양인: 일간 기준
  if(MUNCHANG[dm]!=null) addByBr("문창귀인", new Set([MUNCHANG[dm]]));
  if(YANGIN[dm]!=null) addByBr("양인", new Set([YANGIN[dm]]));
  // 공망(空亡): 일주 기준 2지지
  const gm=gongmang(P.day.s,P.day.b);
  addByBr("공망", new Set(gm));
  // 60갑자 기반 (각 기둥)
  order.forEach((p,i)=>{
    const gj=STEM[p.s]+BR[p.b];
    if(BAEKHO.has(gj)) res[i].push("백호");
    if(GWEGANG.has(gj)) res[i].push("괴강");
  });
  // 귀문관살 (지지 쌍): 자유 축오 인미 묘신 진해 사술
  const GWIMUN=[[0,9],[1,6],[2,7],[3,8],[4,11],[5,10]];
  for(let i=0;i<4;i++)for(let j=i+1;j<4;j++){
    GWIMUN.forEach(pr=>{
      if((branches[i]===pr[0]&&branches[j]===pr[1])||(branches[i]===pr[1]&&branches[j]===pr[0])){
        res[i].push("귀문"); res[j].push("귀문");
      }
    });
  }
  // 천라지망: 천라=술해(10,11), 지망=진사(4,5) 쌍이 있으면
  if(branches.includes(10)&&branches.includes(11)) order.forEach((p,i)=>{ if(p.b===10||p.b===11) res[i].push("천라"); });
  if(branches.includes(4)&&branches.includes(5))  order.forEach((p,i)=>{ if(p.b===4||p.b===5)  res[i].push("지망"); });
  return res.map(a=>[...new Set(a)]);
}

      list.forEach(r=>{
        const set=r.slice(0,2);
        if((arr[i][1]===set[0]&&arr[j][1]===set[1])||(arr[i][1]===set[1]&&arr[j][1]===set[0]))
          fmt(arr[i][0],arr[j][0],r[2]);
      });
    }
  }
  pairScan(HAP_S, stems, (a,b,e)=>out.cheonhap.push(`${a}-${b} 합(${e||""})`));
  pairScan(CHUNG_S, stems, (a,b)=>out.cheonchung.push(`${a}-${b} 충`));
  pairScan(YUKHAP, brs, (a,b,e)=>out.yukhap.push(`${a}-${b} 육합(${e})`));
  pairScan(YUKCHUNG, brs, (a,b)=>out.yukchung.push(`${a}-${b} 충`));
  pairScan(PA, brs, (a,b)=>out.pa.push(`${a}-${b} 파`));
  pairScan(HAE, brs, (a,b)=>out.hae.push(`${a}-${b} 해`));
  const WONJIN=[[0,7],[1,6],[2,9],[3,8],[4,11],[5,10]]; // 자미 축오 인유 묘신 진해 사술
  pairScan(WONJIN, brs, (a,b)=>out.wonjin.push(`${a}-${b} 원진`));
  // 삼합/방합: 3지지 중 2개 이상
  function tripleScan(list, label){
    const present=brs.map(x=>x[1]);
    list.forEach(r=>{
      const need=r.slice(0,3), e=r[3];
      const hit=need.filter(n=>present.includes(n));
      if(hit.length>=3) out[label==="samhap"?"samhap":"banghap"].push(`${need.map(n=>BR[n]).join("")} ${label==="samhap"?"삼합":"방합"}(${e})`);
      else if(hit.length===2) out[label==="samhap"?"samhap":"banghap"].push(`${hit.map(n=>BR[n]).join("")} 반${label==="samhap"?"합":"방합"}(${e})`);
    });
  }
  tripleScan(SAMHAP,"samhap"); tripleScan(BANGHAP,"banghap");
  // 형
  const present=brs.map(x=>x[1]);
  if([2,5,8].every(n=>present.includes(n))) out.hyeong.push("인사신 삼형");
  if([1,10,7].every(n=>present.includes(n))) out.hyeong.push("축술미 삼형");
  if(present.includes(0)&&present.includes(3)) out.hyeong.push("자묘 형");
  [4,6,9,11].forEach(n=>{ if(present.filter(x=>x===n).length>=2) out.hyeong.push(BR[n]+BR[n]+" 자형"); });
  return out;
}

/* ===================== 대운 ===================== */
function calcDaeun(y,m,d,h,mi,S,sex){
  const P=S.pillars;
  const yangYear=(P.year.s%2===0);
  const forward=(yangYear&&sex==="M")||(!yangYear&&sex==="F");
  // 가까운 절(節) 시각: 황경 315+30k
  const lon=S.lon;
  const curSegStart=315+30*Math.floor((((lon-315)%360+360)%360)/30);
  const nextJD=findTermJD(((curSegStart+30)%360), S.birthJD+15);
  const prevJD=findTermJD(((curSegStart)%360), S.birthJD-15);
  let days = forward ? (nextJD - S.birthJD) : (S.birthJD - prevJD);
  let su = Math.max(1, Math.round(days/3));
  // 월주에서 출발
  let idx = P.month.s*0; // placeholder
  const list=[];
  let stem=P.month.s, br=P.month.b;
  const step=forward?1:-1;
  for(let i=0;i<10;i++){
    stem=((stem+step)%10+10)%10; br=((br+step)%12+12)%12;
    list.push({age:su+i*10, s:stem, b:br});
  }
  return {forward, su, list};
}

/* ===================== 렌더링 ===================== */
function ohChip(ohIdx, text){
  return `<span class="chip" style="background:${OH_COLOR[ohIdx]};color:${OH_TEXT[ohIdx]};${ohIdx===3?'border:1px solid #bdbdbd':''}">${text}</span>`;
}
function cellTd(idx, isStem){
  const oh = isStem?STEM_OH[idx]:BR_OH[idx];
  const bg = OH_COLOR[oh];
  const txt = (oh===3)?"#000":"#fff";              // 금(흰배경)이면 글자 검정
  const inset = (oh===3)?";box-shadow:inset 0 0 0 1px #ddd":""; // 흰배경 구분선
  const H = isStem?STEM_H[idx]:BR_H[idx];
  const K = isStem?STEM[idx]:BR[idx];
  return `<td class="gj" style="background:${bg};color:${txt}${inset}">`
       + `<div class="glyph" style="color:${txt}">${H}<span class="ko">${K}</span></div></td>`;
}
function jjgHtml(brIdx, dm){
  return JJG[brIdx].map((x)=>{
    const oh=STEM_OH[x[0]];
    const tg=tenGod(dm,x[0]);
    return `<div>${ohChip(oh,STEM_H[x[0]])} <span style="color:#888">${tg}</span></div>`;
  }).join("");
}

let LAST=null;
function run(){

  LAST={y,m,d,h,mi,sex,opt,S,name};

  const order=[["시주",P.hour],["일주",P.day],["월주",P.month],["년주",P.year]];
  const tgTop=order.map(([nm,p],i)=> i===1?"일간(아신)":tenGod(dm,p.s));
  const tgBot=order.map(([nm,p])=>brTenGod(dm,p.b));
  const stage=order.map(([nm,p])=>twelveStage(dm,p.b));
  const sinsal=calcSinsal(P); // [시,일,월,년]
  const dist=[0,0,0,0,0];

  const pad=n=>String(n).padStart(2,"0");

  // 형충회합 (원국 안에 통합 표기)
  const R=calcRelations(P);
  const relRows=[
    ["천간합",R.cheonhap,"good"],["천간충",R.cheonchung,"warn"],
    ["육합",R.yukhap,"good"],["삼합",R.samhap,"good"],["방합",R.banghap,"good"],
    ["충",R.yukchung,"warn"],["형",R.hyeong,"warn"],["파",R.pa,"warn"],["해",R.hae,"warn"],["원진",R.wonjin,"warn"]

    `<span class="tag ${cls}"><b>${nm}</b> ${arr.join(", ")}</span>`).join("");

  // 월령(月令)
  const wOH=BR_OH[P.month.b];
  const deukryeong=(wOH===STEM_OH[dm])||(GEN[wOH]===STEM_OH[dm]);
  const birthStr=`${y}-${pad(m)}-${pad(d)} ${pad(h)}:${pad(mi)} ${sex==="M"?"남":"여"}`;

  let html=`<div class="card"><h2>${name?name+" · ":""}사주 원국</h2>
  <table class="saju"><thead><tr>${order.map(o=>`<th>${o[0]}</th>`).join("")}</tr></thead><tbody>
   <tr>${tgTop.map(t=>`<td class="ten">${t}</td>`).join("")}</tr>
   <tr>${order.map(([nm,p])=>cellTd(p.s,true)).join("")}</tr>
   <tr>${order.map(([nm,p])=>cellTd(p.b,false)).join("")}</tr>
   <tr>${tgBot.map(t=>`<td class="ten">${t}</td>`).join("")}</tr>
   <tr>${stage.map(t=>`<td class="sub">${t}</td>`).join("")}</tr>
   <tr>${order.map(([nm,p])=>`<td class="jjg">${jjgHtml(p.b,dm)}</td>`).join("")}</tr>
   <tr>${order.map(([nm,p])=>`<td class="sub ss12">${twelveSinsal(P.year.b,p.b)}<br>${twelveSinsal(P.day.b,p.b)}</td>`).join("")}</tr>
   <tr>${sinsal.map(arr=>`<td class="jjg">${arr.length?arr.map(s=>`<span class="tag">${s}</span>`).join(""):"<span style='color:#bbb'>-</span>"}</td>`).join("")}</tr>
  </tbody></table>
  <div class="rel" style="margin-top:10px"><b style="font-size:16px;color:#555">월령</b> <span class="tag">${BR_H[P.month.b]}${BR[P.month.b]}(${OH_NAME[wOH]})·${brTenGod(dm,P.month.b)} → 일간 ${deukryeong?"득령":"실령"}</span></div>
  <div class="rel" style="margin-top:6px"><b style="font-size:16px;color:#555">형충회합</b> ${relHtml||"<span style='color:#bbb'>없음</span>"}</div>
  <div class="hint" style="margin-top:8px">${birthStr} · ${country} ${loc.name} · 표준자오선 ${S.std}°${S.dstApplied?" · 서머타임 -1h":""} · 절기년 ${S.solarYear} · 적용시각 ${pad(S.trueH)}:${pad(S.trueMi)}${opt.trueSolar?` (보정 ${S.offsetMin>0?'+':''}${Math.round(S.offsetMin)}분)`:' (진태양시 미적용)'} · 일주기준일 ${S.dayDate[0]}-${pad(S.dayDate[1])}-${pad(S.dayDate[2])}</div>

  // 대운
  const D=calcDaeun(y,m,d,h,mi,S,sex);

   <tr><th>천간</th>${D.list.map(x=>{const oh=STEM_OH[x.s],t=oh===3?'#000':'#fff';return `<td style="background:${OH_COLOR[oh]};color:${t};font-weight:700${oh===3?';box-shadow:inset 0 0 0 1px #ddd':''}">${STEM_H[x.s]}<br><small style="color:${t}">${tenGod(dm,x.s)}</small></td>`;}).join("")}</tr>
   <tr><th>지지</th>${D.list.map(x=>{const oh=BR_OH[x.b],t=oh===3?'#000':'#fff';return `<td style="background:${OH_COLOR[oh]};color:${t};font-weight:700${oh===3?';box-shadow:inset 0 0 0 1px #ddd':''}">${BR_H[x.b]}<br><small style="color:${t}">${twelveStage(dm,x.b)}</small></td>`;}).join("")}</tr>

  // 신강·신약 / 공망 해석
  const ST=strengthAnalysis(P);

  const GM_MEAN={"년주":"조상·초년운","월주":"부모·형제·직업운","시주":"자녀·말년운"};
  const gmHit=order.filter(([nm,p])=>gm.includes(p.b)).map(([nm])=>`${nm}(${GM_MEAN[nm]||""})`);
  html+=`<div class="card"><h2>신강·신약 / 공망</h2><div class="rel">
   <div><b>일간</b> ${STEM_H[dm]}(${OH_NAME[STEM_OH[dm]]}) · 판정 <span class="tag ${ST.label==='신강'?'good':ST.label==='신약'?'warn':''}">${ST.label}</span> <span style="color:#999;font-size:14px">(내편 ${ST.sup} : 설기·극 ${ST.dr}, ${Math.round(ST.ratio*100)}%)</span></div>
   <div style="margin-top:6px"><b>통근</b> ${ST.rooted.length?ST.rooted.join(", ")+" 지장간에 비겁 뿌리":"무근(無根) — 지지에 같은 오행 뿌리 없음"}</div>
   <div style="margin-top:6px"><b>조후</b> ${ST.season} 출생 · ${ST.johu}</div>
   <div style="margin-top:6px"><b>희신(조후용신)</b> 생월 ${BR_H[P.month.b]} 대비 일간 ${STEM_H[dm]} → ${heesinChips(HEESIN[dm][P.month.b])}</div>
   <div style="margin-top:6px"><b>공망</b> ${BR_H[gm[0]]}${BR[gm[0]]}·${BR_H[gm[1]]}${BR[gm[1]]} → ${gmHit.length?gmHit.join(", "):"원국에 해당 지지 없음"}</div>
   <div class="hint" style="margin-top:6px">지장간 일수비율·위치가중(월지 2.0·일지 1.2·시 0.8·년 0.7)으로 통근 강도 반영. 신강=비겁·인성 우세, 신약=식상·재성·관성으로 설기. 조후는 계절 한열 균형용.</div>
  </div></div>`;

  // 세운(연운)
  const nowY=new Date().getFullYear();
  const saeun=calcSaeun(dm, nowY, 10);
  const seCell=(idx,isStem,extra)=>{const oh=isStem?STEM_OH[idx]:BR_OH[idx],t=oh===3?'#000':'#fff';return `<td style="background:${OH_COLOR[oh]};color:${t};font-weight:700${oh===3?';box-shadow:inset 0 0 0 1px #ddd':''}">${isStem?STEM_H[idx]:BR_H[idx]}<br><small style="color:${t}">${extra}</small></td>`;};
  html+=`<div class="card"><h2>세운 (연운, ${nowY}~)</h2>

   </table><div class="hint" style="margin-top:6px">양력연도 기준 간략 표기(입춘 전 출생연 보정 미적용).</div></div>`;

  document.getElementById('result').innerHTML=html;

/* ===================== 노션 복사용 텍스트 ===================== */
function buildCopyText(order,tgTop,tgBot,stage,sinsal,R,D,dm,meta){
  const cols=order.map(o=>o[0]);
  const pad=n=>String(n).padStart(2,"0");
  const birth=`${meta.y}-${pad(meta.m)}-${pad(meta.d)} ${pad(meta.h)}:${pad(meta.mi)}`;
  const gjStr=o=>STEM_H[o.s]+BR_H[o.b];
  const distStr=meta.dist.map((c,i)=>OH_NAME[i]+c).join(" ");
  let t=`■ ${meta.name?meta.name+" ":""}사주 원국 (${birth} / ${meta.sex==="M"?"남":"여"})\n`;
  t+=`| 구분 | ${cols.join(" | ")} |\n|---|---|---|---|---|\n`;
  t+=`| 십성(천간) | ${tgTop.join(" | ")} |\n`;
  t+=`| 천간 | ${order.map(o=>STEM_H[o[1].s]+STEM[o[1].s]).join(" | ")} |\n`;
  t+=`| 지지 | ${order.map(o=>BR_H[o[1].b]+BR[o[1].b]).join(" | ")} |\n`;
  t+=`| 십성(지지) | ${tgBot.join(" | ")} |\n`;
  t+=`| 12운성 | ${stage.join(" | ")} |\n`;
  t+=`| 신살 | ${sinsal.map(a=>a.length?a.join(","):"-").join(" | ")} |\n\n`;
  t+=`오행분포: ${distStr}\n`;
  const relParts=[];
  if(R.cheonhap.length)relParts.push("천간합 "+R.cheonhap.join(", "));
  if(R.cheonchung.length)relParts.push("천간충 "+R.cheonchung.join(", "));
  if(R.yukhap.length)relParts.push("육합 "+R.yukhap.join(", "));
  if(R.samhap.length)relParts.push("삼합 "+R.samhap.join(", "));
  if(R.banghap.length)relParts.push("방합 "+R.banghap.join(", "));
  if(R.yukchung.length)relParts.push("지지충 "+R.yukchung.join(", "));
  if(R.hyeong.length)relParts.push("형 "+R.hyeong.join(", "));
  if(R.pa.length)relParts.push("파 "+R.pa.join(", "));
  if(R.hae.length)relParts.push("해 "+R.hae.join(", "));
  if(R.wonjin.length)relParts.push("원진 "+R.wonjin.join(", "));
  t+=`형충회합: ${relParts.length?relParts.join(" / "):"없음"}\n\n`;
  t+=`대운 (${D.forward?"순행":"역행"}, 대운수 ${D.su})\n`;
  t+=`| 나이 | ${D.list.map(x=>x.age).join(" | ")} |\n|`+"---|".repeat(D.list.length+1)+`\n`;
  t+=`| 간지 | ${D.list.map(x=>STEM_H[x.s]+BR_H[x.b]).join(" | ")} |\n`;

  // ── 노션 DB용 TSV (헤더+한 줄) : 노션 데이터베이스에 붙여넣으면 행 생성 ──
  const H=["이름","생년월일시","성별","시주","일주","월주","년주","일간","오행분포"];
  const row=[meta.name||"", birth, meta.sex==="M"?"남":"여",
    gjStr(order[0][1]), gjStr(order[1][1]), gjStr(order[2][1]), gjStr(order[3][1]),
    STEM_H[dm]+"("+OH_NAME[STEM_OH[dm]]+")", distStr];
  t+=`\n■ 노션 DB용 (탭구분 TSV · DB에 붙여넣기)\n`+H.join("\t")+`\n`+row.join("\t")+`\n`;
  document.getElementById('copyArea').value=t;
}
function flash(btn,msg){ if(!btn)return; if(btn._o===undefined)btn._o=btn.textContent; btn.textContent=msg; clearTimeout(btn._t); btn._t=setTimeout(()=>{btn.textContent=btn._o;btn._o=undefined;},1600); }
const pad2=n=>String(n).padStart(2,"0");
const CAP_W=440;               // 폰 화면처럼 좁은 폭 → 글자가 크게
function capBg(){ return getComputedStyle(document.body).backgroundColor || "#eceae3"; }
function dlImg(url, fn){ const a=document.createElement('a'); a.download=fn; a.href=url; a.click(); }
// 노드를 캡처해 9:16(폰) 비율로 반환 — 좌우 여백 없음(폭 채움), 부족하면 위아래만 패딩
async function capture34(node, bg){
  const c=await html2canvas(node,{backgroundColor:bg, scale:3, useCORS:true, windowWidth:CAP_W, width:CAP_W});
  const cw=c.width, ch=c.height;
  const minH=Math.round(cw*16/9);          // 9:16 최소 높이
  const fw=cw, fh=Math.max(ch, minH);      // 좌우 패딩 없음, 내용이 길면 그만큼 길어짐
  const out=document.createElement('canvas'); out.width=fw; out.height=fh;
  const x=out.getContext('2d'); x.fillStyle=bg; x.fillRect(0,0,fw,fh);
  x.drawImage(c, 0, Math.round((fh-ch)/2));
  return out.toDataURL('image/png');
}
function makeCapBox(headHtml, cards, bg){
  const box=document.createElement('div');
  box.className='capbox cap';
  box.style.cssText=`position:fixed; left:-10000px; top:0; width:${CAP_W}px; background:${bg};`;
  box.innerHTML=headHtml;
  cards.forEach(c=>box.appendChild(c.cloneNode(true)));
  document.body.appendChild(box);
  return box;
}
async function saveImage(ev){
  const btn=ev && ev.currentTarget;
  const el=document.getElementById('result');
  if(!el || !el.innerHTML.trim()){ flash(btn,"먼저 뽑기"); return; }
  if(typeof html2canvas!=='function'){ flash(btn,"로드 실패(인터넷)"); return; }
  flash(btn,"생성 중…");
  const bg=capBg();
  const nm=(LAST&&LAST.name)?LAST.name:"";
  const meta=LAST?`${LAST.y}-${pad2(LAST.m)}-${pad2(LAST.d)} ${pad2(LAST.h)}:${pad2(LAST.mi)} · ${LAST.sex==='M'?'남':'여'}`:"";
  const head=`<div class="caphead"><div class="capname">${nm||"사주 만세력"}</div><div class="capmeta">${meta}</div></div>`;
  const base=(nm?nm+"_":"사주_")+(LAST?`${LAST.y}-${pad2(LAST.m)}-${pad2(LAST.d)}`:"");
  const cards=[...el.children];
  let b1,b2;
  try{
    b1=makeCapBox(head, [cards[0]], bg);              // ① 원국
    b2=makeCapBox(head, cards.slice(1), bg);          // ② 나머지
    const u1=await capture34(b1,bg), u2=await capture34(b2,bg);
    dlImg(u1, base+"_1_원국.png");
    setTimeout(()=>dlImg(u2, base+"_2_분석.png"), 500);
    flash(btn,"저장됨! (2장)");
  }catch(e){ flash(btn,"실패"); }
  finally{ if(b1)b1.remove(); if(b2)b2.remove(); }
}

initLocation(); // 국가/지역 셀렉트 초기화
run(); // 초기 예시
